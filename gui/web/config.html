<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="config.css">
    <title>ROBO-TECH Debug</title>

<body>
    <div class="rectangle">
        <div class="pid-container">
            <div class="pid">
                <p>PID</p>
            </div>
        </div>
        <div class="yaw_flex">
            <div class="yaw" >
                <p>yaw</p>
            </div>
            <div class="yaw_labels">
                <form action="" method="post">                
                    <input class ="labels" type="text" id="yaw1" name="user-input" placeholder="KP">
                    <input class ="labels" type="text" id="yaw2" name="user-input" placeholder="KI">
                    <input class ="labels" type="text" id="yaw3" name="user-input" placeholder="KD">
                </form>
            </div>
        </div>
                <div class="pitch_flex">
                    <div class="pitch">
                        <p>pitch</p>
                    </div>
                    <div class="pitch_labels" >
                        <form action="" method="post">                
                            <input class ="labels" type="text" id="pitch1" name="user-input" placeholder="KP">
                            <input class ="labels" type="text" id="pitch2" name="user-input" placeholder="KI">
                            <input class ="labels" type="text" id="pitch3" name="user-input" placeholder="KD">
                        </form>
                    </div>
                </div>
        <div class="BLDC-container">
            <div class="BLDC" >
                <p>BLDC</p>
            </div>
            <div class="BLDC_labels" >
                <form action="" method="post">                
                    <input  class ="labels" type="text" id="BLDC1" name="user-input" placeholder="BLDC-1">
                    <input  class ="labels" type="text" id="BLDC2" name="user-input" placeholder="BLDC-2">
                    <input  class ="labels" type="text" id="BLDC3" name="user-input" placeholder="BLDC-3">
                    <input  class ="labels" type="text" id="BLDC4" name="user-input" placeholder="BLDC-4">
                    <input  class ="labels" type="text" id="BLDC5" name="user-input" placeholder="BLDC-5">
                    <input  class ="labels" type="text" id="BLDC6" name="user-input" placeholder="BLDC-6">
                </form>
            </div>
            <button class="bldc_button">
                <p>add BLDC</p>
            </button>
        </div>    
        <div class="servo_flex">
            <div class="servo" >
                <p>servo motor</p>
            </div>
            <div class="servo_labels">
                <form action="" method="post">                
                    <input  class ="labels" type="text" id="servo" name="user-input" placeholder="Servo">
                </form>
            </div>
            <button class="servo_button">
                <p>add servo motor</p>
            </button>
        </div>
        <div class="switch_flex">
            <div class="switch" >
                <p>switch circuit</p>
            </div>
            <div class="switch_labels">
                <form action="" method="post">                
                    <input class ="labels" type="text" id="switch1" name="user-input" placeholder="Switch-1">
                    <input class ="labels" type="text" id="switch2" name="user-input" placeholder="Switch-2">
                    <input class ="labels" type="text" id="switch3" name="user-input" placeholder="Switch-3">
                </form>
            </div>
            <button class="switch_button" >
                <p>add switch circuit</p>
            </button>
        </div>
        <div class="DC_flex">
            <div class="DC" >
                <p >DC</p>
            </div>
            <div class="DC_labels" >
                <form action="" method="post">                
                    <input class ="labels" type="text" id="DC1" name="user-input" placeholder="DC-1">
                    <input class ="labels" type="text" id="DC2" name="user-input" placeholder="DC-2">
                    <input class ="labels" type="text" id="DC3" name="user-input" placeholder="DC-3">
                    <input class ="labels" type="text" id="DC4" name="user-input" placeholder="DC-4">
                </form>
            </div>
            <button class="dc_button">
                <p>add DC</p>
            </button>
        </div>

          </svg>
        </button>
    </div>
