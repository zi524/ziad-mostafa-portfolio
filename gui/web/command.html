        <div class="mode-switch">
            <button id="system-mode" class="mode-btn active">
                System Mode
            </button>
            <button id="node-mode" class="mode-btn">
                Node Mode
            </button>
        </div>
        <textarea id="response-output" class="terminal-textarea" readonly></textarea>
    </div>

        <button id = "debug-button" class="DEBUG">
            Debug
        </button>
        <button id ="test-button" class="TEST">
           Test
        </button>
        <button id = "kill-button" class="KILL">
            KILL
        </button>
    </div>

    <div id="additional-buttons" style="display: none;">
        <!-- Container for 'test' buttons -->
        <div id="test-buttons" class="action-buttons" style="display: none;">
            <p>Motion testing</p>
            <button class="test-btn component-btn motion-btn">x_planeright</button>
            <button class="test-btn component-btn motion-btn">x_planeleft</button>
            <button class="test-btn component-btn motion-btn">y_planeforward</button>
            <button class="test-btn component-btn motion-btn">y_planebackward</button>
            <button class="test-btn component-btn motion-btn">yaw_positive</button>
            <button class="test-btn component-btn motion-btn">yaw_negative</button>
            <button class="test-btn component-btn motion-btn">z_planeup</button>
            <button class="test-btn component-btn motion-btn">z_planedown</button>
            <button class="test-btn component-btn motion-btn">pitch_positive</button>
            <button class="test-btn component-btn motion-btn">pitch_negative</button>
            <p>Components testing</p>
            <button class="test-btn component-btn motion-btn" id="motor">bldc_1</button>
            <button class="test-btn component-btn motion-btn" id="motor">bldc_2</button>
            <button class="test-btn component-btn motion-btn" id="motor">bldc_3</button>
            <button class="test-btn component-btn motion-btn" id="motor">bldc_4</button>
            <button class="test-btn component-btn motion-btn" id="motor">bldc_5</button>
            <button class="test-btn component-btn motion-btn" id="motor">bldc_6</button>
            <button class="test-btn component-btn motion-btn" id="motor">dc_1</button>
            <button class="test-btn component-btn motion-btn" id="motor">gripper_1</button>
            <button class="test-btn component-btn motion-btn" id="motor">gripper_2</button>
            <!-- <button class="test-btn component-btn motion-btn" id="motor">dc_3</button>
            <button class="test-btn component-btn motion-btn" id="motor">dc_4</button> -->
            <button class="test-btn component-btn motion-btn" id="motor">servo_1</button>
            <button class="test-btn component-btn motion-btn" id="mpu">mpu</button>
            <button class="test-btn component-btn motion-btn" id="cameras">cameras</button>
        </div>
    
        <div id="debug-buttons" class="action-buttons" style="display: none;">
            <button class = "component-btn debug-btn" id="motor">bldc_1</button>
            <button class = "component-btn debug-btn" id="motor">bldc_2</button>
            <button class = "component-btn debug-btn" id="motor">bldc_3</button>
            <button class = "component-btn debug-btn" id="motor">bldc_4</button>
            <button class = "component-btn debug-btn" id="motor">bldc_5</button>
            <button class = "component-btn debug-btn" id="motor">bldc_6</button>
            <button class = "component-btn debug-btn" id="motor">dc_1</button>
            <button class = "component-btn debug-btn" id="motor">dc_2</button>
            <!-- <button class = "component-btn debug-btn" id="motor">dc_3</button>
            <button class = "component-btn debug-btn" id="motor">dc_4</button> -->
            <button class = "component-btn debug-btn" id="motor">servo_1</button>
            <button class = "component-btn debug-btn" id="mpu">mpu</button>
            <button class = "component-btn debug-btn" id="cameras">cameras</button>
        </div>
        <div id="kill-buttons" class="action-buttons" style="display: none;">
            <button class = "component-btn kill-btn" id="motor">bldc_1</button>
            <button class = "component-btn kill-btn" id="motor">bldc_2</button>
            <button class = "component-btn kill-btn" id="motor">bldc_3</button>
            <button class = "component-btn kill-btn" id="motor">bldc_4</button>

            <button class = "component-btn debug-btn"id="motor">dc_4</button>
            <button class = "component-btn kill-btn" id="motor">servo_1</button>
            <button class = "component-btn kill-btn" id="mpu">mpu</button>
            <button class = "component-btn kill-btn" id="cameras">cameras</button>
            <button class = "component-btn kill-btn" id="System">System</button>
