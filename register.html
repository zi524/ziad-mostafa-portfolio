<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Grid Test</title>

  <!-- Bootstrap CSS -->
  <link
    rel="stylesheet"
    href="tapout.css"
    >
  <link    
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
  >
  <script src="register.js"></script>

</head>

<body>
<div class="container">
  <div class="row mt-5">
    <div class="col bg-danger text-white box">
     <h1> Tapout</h1>
    </div>
    <div class="col bg-danger text-white box">
     <h1>Registerision</h1> 
    </div>
  </div>

  <div class="row mt-5">
    <div class="col text-black " style="margin-left: 30%;">
     <h1 style="display: inline;"> Name </h1>
     <input id="name_reg" type="text" style="box-sizing: border-box; display: inline; margin-left:60px" required>
    </div>
  </div>

  <div class="row mt-5">
    <div class="col text-black " style="margin-left: 30%;">
     <h1 style="display: inline;"> Email </h1>
     <input id="email_reg" type="email"style="box-sizing: border-box; display: inline; margin-left:70px" required>
    </div>
  </div>

  <div class="row mt-5">
    <div class="col text-black " style="margin-left: 30%;">
     <h1 style="display: inline;"> Password </h1>
     <input id="password_reg" type="password" style="box-sizing: border-box; display: inline;" required>
    </div>
  </div>  
  <div class="row mt-5">
    <div class="col text-black " style="margin-left: 50%;">
     <button id="save_reg" style="box-sizing: border-box; display: inline;" >Save</button>
    </div>
  </div>  
</div>
</body>
</html>
