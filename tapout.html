<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Log in Tapout</title>

  <!-- Bootstrap CSS -->
  <link
    rel="stylesheet"
    href="tapout.css"
    >
  <link    
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
  >
  <script src="login.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
</head>

<body>
<div class="container">
  <div class="row mt-5">
    <div class="col bg-danger text-white box">
     <h1> Tapout</h1>
    </div>
    <div class="col bg-danger text-white box">
     <h1>Registerision</h1> 
    </div>
  </div>
  
  <div class="row mt-5">
    <div class="col text-black " style="margin-left: 30%;">
     <h1 style="display: inline;"> Email </h1>
     <input id="email" type="email"style="box-sizing: border-box; display: inline; margin-left:70px" required>
    </div>
  </div>

  <div class="row mt-5">
    <div class="col text-black " style="margin-left: 30%;">
     <h1 style="display: inline;"> Password </h1>
     <input id="password" type="password" style="box-sizing: border-box; display: inline;" required>
    </div>
  </div>  
  <div class="row mt-5">
    <div class="col text-black " style="margin-left: 50%;">
     <button id="login" style="box-sizing: border-box; display: inline;" >Log in</button>
     <a href="register.html" style="text-decoration: none;">
     <button id="register" style="box-sizing: border-box; display: inline; margin-left:10px;">Register</button>
     </a>
    </div>
  </div>  
</div>
</body>
</html>
